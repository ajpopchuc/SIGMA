version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: frank123123/sigma-backendd:latest
    container_name: laravel_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_DATABASE=infraestructura_umes
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: mysql:8
    container_name: mysql_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: infraestructura_umes
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

volumes:
  db_data:

networks:
 app_network: