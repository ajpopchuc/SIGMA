<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
  <div class="subheader py-2 py-lg-12 subheader-transparent" id="kt_subheader">
    <div class="container d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
      <div class="d-flex align-items-center flex-wrap mr-1">
        <div class="d-flex flex-column">
          <h2 class="text-white font-weight-bold my-2 mr-5">Usuarios</h2>
          <div class="d-flex align-items-center font-weight-bold my-2">
            <a [routerLink]="['/inicio']" class="opacity-75 hover-opacity-100">
              <i class="flaticon2-shelter text-white icon-1x"></i>
            </a>
            <span class="label label-dot label-sm bg-white opacity-75 mx-3"></span>
            <a [routerLink]="['/usuarios']" class="text-white text-hover-white opacity-75 hover-opacity-100">Usuarios</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex flex-column-fluid">
    <div class="container">
      <div class="card card-custom">
        <div class="card-header flex-wrap border-0 pt-6 pb-0">
          <div class="card-title" *ngIf="service.permisoEspecifico('Ver usuarios')">
            <h3 class="card-label">Listado de usuarios</h3>
          </div>
          <div class="card-toolbar">
            <button class="btn btn-primary font-weight-bolder" [routerLink]="['/usuarios/crear']" *ngIf="service.permisoEspecifico('Crear usuario')"><i class="fas fa-book-reader"></i> Crear nuevo usuario</button>
          </div>
        </div>
        <div class="card-body" *ngIf="service.permisoEspecifico('Ver usuarios')">
          <div class="mb-7">
            <div class="row align-items-center">
              <div class="col-lg-9 col-xl-8">
                <div class="row align-items-center">
                  <div class="col-md-4 my-2 my-md-0">
                    <div class="input-icon">
                      <input type="text" class="form-control" placeholder="Buscar..." [(ngModel)]="searchText" (input)="onSearchTextChange()" />
                      <span>
                        <i class="flaticon2-search-1 text-muted"></i>
                      </span>
                    </div>
                  </div>
                  <div class="col-md-4 my-2 my-md-0">
                    <div class="d-flex align-items-center">
                      <label class="mr-3 mb-0 d-none d-md-block">Estado:</label>
                      <select class="form-control" [(ngModel)]="selectedStatus" (change)="onStatusChange()">
                        <option value="Activo" selected>Activo</option>
                        <option value="Inactivo">Inactivo</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <table class="table datatable datatable-bordered datatable-head-custom" id="kt_datatable">
            <thead>
              <tr>
                <th>Id</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th style="width: 100px;">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let usuario of filteredUsuarios | paginate: { itemsPerPage: itemsPerPage, currentPage: currentPage }">
                <td>{{ usuario.id }}</td>
                <td>{{ usuario.usuario }}</td>              
                <td>{{ usuario.rol }}</td>
                <td style="display: flex; justify-content: center; align-items: center;">
                  <a href="javascript:void(0)" (click)="openModal(usuario.id)" *ngIf="service.permisoEspecifico('Cambiar contraseña')">
                    <i class="fas fa-lock" style="color: #012A15;"></i>
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
          <pagination-controls
            class="pagination-controls"
            (pageChange)="currentPage = $event"
            previousLabel="Anterior"
            nextLabel="Siguiente"
          ></pagination-controls>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal" [style.display]="isModalOpen ? 'block' : 'none'" style="display: flex; align-items: center; justify-content: center;">
  <div class="modal-dialog" style="max-width: 40vw;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="fw-bolder">Cambiar Contraseña</h2>
        <div>
          <button (click)="closeModalCrear()">Cerrar</button>
        </div>
      </div>
      <div class="modal-body scroll-y mx-lg-5 my-7">
        <form [formGroup]="changePasswordForm" class="form">
          <div class="fv-row mb-10">
            <label class="fs-5 fw-bolder form-label mb-2">
              <span class="required">Nueva contraseña</span>
            </label>
            <input type="hidden" formControlName="id_usuario" />
            <input type="password" formControlName="newPassword" class="form-control" placeholder="Ingrese su nueva contraseña" />
          </div>
          <div class="fv-row mb-10">
            <label class="fs-5 fw-bolder form-label mb-2">
              <span class="required">Confirmar nueva contraseña</span>
            </label>
            <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Confirme su nueva contraseña" />
          </div>
          <div class="text-center pt-15">
            <button class="btn btn-white me-3" (click)="closeModalCrear()">Cancelar</button> &nbsp; &nbsp;
            <button type="button" class="btn btn-primary" (click)="cambiarContra()">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
