<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
  <div class="subheader py-2 py-lg-12 subheader-transparent" id="kt_subheader">
    <div class="container d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
      <div class="d-flex align-items-center flex-wrap mr-1">
        <div class="d-flex flex-column">
          <h2 class="text-white font-weight-bold my-2 mr-5">Calendarización</h2>
          <div class="d-flex align-items-center font-weight-bold my-2">
            <a [routerLink]="['/inicio']" class="opacity-75 hover-opacity-100">
              <i class="flaticon2-shelter text-white icon-1x"></i>
            </a>
            <span class="label label-dot label-sm bg-white opacity-75 mx-3"></span>
            <a [routerLink]="['/calendarizacion']" class="text-white text-hover-white opacity-75 hover-opacity-100">Calendarización</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="d-flex flex-column-fluid">
    <div class="container">
      <div class="card card-custom">
        <div class="card-header flex-wrap border-0 pt-6 pb-0">
          <div class="card-title">
            <h3 class="card-label">Calendario de Actividades</h3>
          </div>
                    
          <div class="card-title h6 d-flex flex-wrap justify-content-start">
            <div class="col-md-4 col-sm-12 mb-2">
              <select 
                id="filtroEstadoProceso" 
                [(ngModel)]="estadoSeleccionado" 
                (change)="onFiltroChange()"
                class="form-control h-auto p-3 border-0 rounded-lg font-size-h6 w-100">
                <option value="todas">Ver todas</option>
                <option value="Pendiente" selected>Ver pendientes</option>
                <option value="Realizado">Ver realizadas</option>
                <option value="enProceso">Ver en proceso</option>
                <option value="Anulada">Ver anuladas</option>
              </select>
            </div>
          
            <div class="col-md-4 col-sm-12 mb-2">
              <select 
                id="filtroTipoActividad" 
                [(ngModel)]="actividadSeleccionada" 
                (change)="onFiltroChange()"
                class="form-control h-auto p-3 border-0 rounded-lg font-size-h6 w-100">
                <option value="todas" selected>Todas las actividades</option>
                <option value="Inspección">Ver inspecciones</option>
                <option value="Mantenimiento">Ver mantenimientos</option>
                <option value="Supervisión">Ver supervisiones</option>
              </select>
            </div>
          
            <div class="col-md-4 col-sm-12 mb-2">
              <select 
                id="filtroUsuario" 
                [(ngModel)]="usuarioSeleccionado" 
                (change)="onFiltroChange()"
                class="form-control h-auto p-3 border-0 rounded-lg font-size-h6 w-100">
                <option value="todos" selected>Todos los usuarios</option>
                <option *ngFor="let usuario of usuarios" [value]="usuario.id">{{ usuario.nombre }}</option>
              </select>
            </div>
          </div>
            

        </div>

        <div class="card-body">
          <full-calendar #calendar [options]="calendarOptions"></full-calendar>
        </div>
      </div>
    </div>
  </div>
</div>
