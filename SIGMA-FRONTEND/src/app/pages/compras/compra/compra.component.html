<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
  <div class="subheader py-2 py-lg-12 subheader-transparent" id="kt_subheader">
      <div class="container d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
          <div class="d-flex align-items-center flex-wrap mr-1">
              <div class="d-flex flex-column">
                  <h2 class="text-white font-weight-bold my-2 mr-5">Compras</h2>
                  <div class="d-flex align-items-center font-weight-bold my-2">
                      <a [routerLink]="['/inicio']" class="opacity-75 hover-opacity-100">
                          <i class="flaticon2-shelter text-white icon-1x"></i>
                      </a>
                      <span class="label label-dot label-sm bg-white opacity-75 mx-3"></span>
                      <a [routerLink]="['/Compras']" class="text-white text-hover-white opacity-75 hover-opacity-100">Compras</a>
                  </div>
              </div>
          </div>
      </div>
  </div>

  <div class="d-flex flex-column-fluid">
    <div class="container">
      <div class="card card-custom">
        <div class="card-header flex-wrap border-0 pt-6 pb-0">
          <div class="card-title">
            <h3 class="card-label">Listado de compras</h3>
          </div>
          <div class="card-toolbar">
            <button *ngIf="servicePermiso.permisoEspecifico('Crear compra')" class="btn btn-primary font-weight-bolder" [routerLink]="['crear']">
              <i class="fas fa-shopping-cart"></i> Crear nueva compra
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="mb-7">
            <div class="row align-items-center">
              <div class="col-lg-9 col-xl-8">
                <div class="row align-items-center">
                  <div class="col-md-4 my-2 my-md-0">
                    <div class="input-icon">
                      <input type="text" class="form-control" placeholder="Buscar..." 
                             [(ngModel)]="searchText" (input)="onSearchTextChange()" />
                      <span>
                        <i class="flaticon2-search-1 text-muted"></i>
                      </span>
                    </div>
                  </div>
                  <div class="col-md-4 my-2 my-md-0">
                    <div class="d-flex align-items-center">
                      <label class="mr-3 mb-0 d-none d-md-block">Estado:</label>
                      <select class="form-control" [(ngModel)]="selectedStatus" (change)="onStatusChange()">
                        <option value="Activo" selected>Activo</option>
                        <option value="Cancelado">Cancelado</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <table class="table datatable datatable-bordered datatable-head-custom" id="kt_datatable">
            <thead>
              <tr>
                <th>Id</th>
                <th>Proveedor</th>
                <th>Total</th>
                <th>Fecha</th>
                <th>No. Factura</th>
                <th>Serie Factura</th>
                <th>Área</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let compra of filteredCompras">
                <td>{{ compra.id }}</td>
                <td>{{ compra.proveedor }}</td>
                <td>{{ compra.total | currency:'Q ' }}</td>
                <td>{{ compra.fecha_factura }}</td>
                <td>{{ compra.no_factura }}</td>
                <td>{{ compra.serie_factura }}</td>
                <td>{{ compra.area }}</td>
                <td>
                  <button class="btn2 btn-sm btn-clean btn-icon mr-2" (click)="cancelCompra(compra.id)" 
                          *ngIf="compra.estado !== 'Cancelado' && servicePermiso.permisoEspecifico('Anular compra')" title="Anular compra">
                        <i class="fas fa-trash" style="color: #012A15;"></i>
                  </button>
                  <button *ngIf="servicePermiso.permisoEspecifico('Ver recibo de compra')" class="btn2 btn-sm btn-clean btn-icon" (click)="viewCompra(compra.id)" 
                          title="Ver detalles">
                          <i class="fas fa-eye" style="color: #012A15;"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
